name: CI/CD Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # -----------------------------------------------
  # JOB 1: SAST - Análisis estático con Semgrep
  # -----------------------------------------------
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/secrets --config=p/owasp-top-ten src/ --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # -----------------------------------------------
  # JOB 2: SAST - Análisis con Bandit
  # -----------------------------------------------
  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # -----------------------------------------------
  # JOB 3: SCA - Vulnerabilidades en dependencias
  # -----------------------------------------------
  sca-dependencies:
    name: SCA - Snyk Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Run Snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # -----------------------------------------------
  # JOB 4: Secret Scanning con TruffleHog
  # -----------------------------------------------
  secret-scanning:
    name: Secret Scanning - TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --debug --only-verified

  # -----------------------------------------------
  # JOB 5: Container Scanning con Trivy
  # -----------------------------------------------
  container-scanning:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t devsecops-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  # -----------------------------------------------
  # JOB 6: Security Gate - Bloquea el merge
  # -----------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast-bandit, secret-scanning]
    steps:
      - name: Security Gate Passed
        run: |
          echo "✅ Todos los checks de seguridad pasaron"
          echo "✅ Merge permitido"